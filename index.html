<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaluka's Blog (Vanilla JS)</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 font-sans p-4 sm:p-8">
  <div class="max-w-5xl mx-auto flex flex-col min-h-screen">
    <!-- Header -->
    <header class="py-12 border-b border-gray-200 mb-8 sm:py-16">
      <h1 class="text-4xl sm:text-5xl font-black tracking-tight text-gray-900 cursor-pointer" onclick="goHome()">Shaluka's Blog.</h1>
      <p class="mt-4 text-xl text-gray-500 font-medium">Thoughts, code, and everything in between.</p>
    </header>

    <!-- Navigation Tabs -->
    <nav id="main-nav" class="flex border-b border-gray-200 mb-8 overflow-x-auto">
      <button id="btn-tab-internal"
        class="py-4 px-6 font-bold border-b-4 border-blue-600 text-blue-600 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('internal')">
        📝 My Blogs
      </button>
      <button id="btn-tab-external"
        class="py-4 px-6 font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-900 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('external')">
        🔗 External Publications
      </button>
    </nav>
    
    <!-- Search Bar -->
    <div id="search-container" class="mb-8 max-w-lg">
      <input type="text" id="search-input" placeholder="Search blogs..." class="w-full py-3 px-4 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none transition-colors text-gray-900 placeholder-gray-400 font-medium shadow-sm" oninput="filterBlogs()">
    </div>

    <!-- Tab 1: Internal Content (Managed by app.js) -->
    <div id="tab-internal" class="block">
      <main id="app-content">
        <div class="text-gray-500 font-bold text-center py-20 text-xl">Loading your site...</div>
      </main>
    </div>

    <!-- Tab 2: External Content (Managed by app.js) -->
    <div id="tab-external" class="hidden flex-grow">
      <div id="external-articles-list" class="space-y-4">
        <!-- Populated via Javascript -->
      </div>
    </div>
    
    <!-- Footer with Main Site Link -->
    <footer class="mt-auto pt-16 pb-8 text-center">
      <a href="https://sh4lu-z.vercel.app/" target="_blank" class="inline-flex items-center gap-2 bg-gray-900 text-white px-8 py-3 rounded-full font-bold shadow-md hover:bg-blue-600 hover:shadow-xl transition-all transform hover:-translate-y-0.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
        Visit My Main Website
      </a>
    </footer>
  </div>
  <script type="module" src="app.js"></script>
</body>

</html>
