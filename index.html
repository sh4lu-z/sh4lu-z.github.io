<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaluka's Blog (Vanilla JS)</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans p-4 sm:p-8">
  <div class="max-w-5xl mx-auto">
    <!-- Header -->
    <header class="py-12 flex flex-col sm:flex-row justify-between items-start sm:items-end border-b border-gray-200 mb-8 sm:py-16 gap-6">
      <div>
        <div class="inline-flex items-center gap-2 px-3 py-1 bg-gray-100 text-gray-600 rounded-full text-xs font-bold uppercase tracking-widest mb-4">
          <span class="w-2 h-2 rounded-full bg-green-500"></span> Writing Space
        </div>
        <h1 class="text-5xl sm:text-6xl font-black tracking-tight text-gray-900 cursor-pointer hover:text-blue-600 transition-colors" onclick="goHome()">Shaluka's Notebook.</h1>
        <p class="mt-4 text-xl text-gray-500 font-medium max-w-xl">Deep dives into code, tutorials, and thoughts on software engineering.</p>
      </div>
      
      <a href="https://sh4lu-z.vercel.app/" target="_blank" class="shrink-0 flex items-center justify-center gap-2 bg-gray-900 text-white px-6 py-3.5 rounded-full font-bold shadow-md hover:bg-blue-600 hover:shadow-xl transition-all transform hover:-translate-y-0.5">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
        Main Portfolio
      </a>
    </header>

    <!-- Navigation Tabs -->
    <nav id="main-nav" class="flex border-b border-gray-200 mb-8 overflow-x-auto">
      <button id="btn-tab-internal" class="py-4 px-6 font-bold border-b-4 border-blue-600 text-blue-600 focus:outline-none whitespace-nowrap transition-colors" onclick="switchTab('internal')">
        📝 My Blogs
      </button>
      <button id="btn-tab-external" class="py-4 px-6 font-bold border-b-4 border-transparent text-gray-500 hover:text-gray-900 focus:outline-none whitespace-nowrap transition-colors" onclick="switchTab('external')">
        🔗 External Publications
      </button>
    </nav>

    <!-- Search Bar -->
    <div id="search-container" class="mb-8">
      <div class="relative max-w-lg">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
          </svg>
        </div>
        <input type="text" id="search-input" placeholder="Search blogs by title or description..." class="w-full pl-11 pr-4 py-3 bg-white border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all text-gray-900 placeholder-gray-400 font-medium" oninput="filterBlogs()">
      </div>
    </div>

    <!-- Tab 1: Internal Content (Managed by app.js) -->
    <div id="tab-internal" class="block">
      <main id="app-content">
        <div class="text-gray-500 font-bold text-center py-20 text-xl">Loading your site...</div>
      </main>
    </div>

    <!-- Tab 2: External Content (Managed by app.js) -->
    <div id="tab-external" class="hidden">
      <div id="external-articles-list" class="space-y-4">
         <!-- Populated via Javascript -->
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
