<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaluka's Blog (Vanilla JS)</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-[#fcfcfc] text-gray-900 font-serif p-4 sm:p-12">
  <div class="max-w-4xl mx-auto">
    <!-- Header -->
    <header class="py-12 border-b-2 border-gray-900 mb-10 sm:py-16">
      <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-6">
        <div>
          <h1 class="text-4xl sm:text-5xl font-normal tracking-tight text-gray-900 cursor-pointer italic" onclick="goHome()">Research & Publications.</h1>
          <p class="mt-4 text-lg text-gray-600">A repository of academic thoughts, engineering methodologies, and findings.</p>
        </div>
        <a href="https://sh4lu-z.vercel.app/" target="_blank" class="shrink-0 text-sm font-bold uppercase tracking-widest border border-gray-900 text-gray-900 px-6 py-2.5 hover:bg-gray-900 hover:text-white transition-colors duration-300">
          Curriculum Vitae
        </a>
      </div>
    </header>

    <!-- Navigation Tabs -->
    <nav id="main-nav" class="flex border-b border-gray-200 mb-6 overflow-x-auto">
      <button id="btn-tab-internal"
        class="py-3 px-6 text-sm font-bold tracking-widest uppercase border-b-2 border-gray-900 text-gray-900 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('internal')">
        Internal Abstracts
      </button>
      <button id="btn-tab-external"
        class="py-3 px-6 text-sm font-bold tracking-widest uppercase border-b-2 border-transparent text-gray-400 hover:text-gray-900 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('external')">
        External Papers
      </button>
    </nav>
    
    <!-- Minimalist Search Window -->
    <div id="search-container" class="mb-10 max-w-lg">
       <input type="text" id="search-input" placeholder="Search index..." class="w-full py-2 bg-transparent border-b border-gray-300 focus:border-gray-900 focus:outline-none transition-colors text-gray-900 placeholder-gray-400 text-sm font-bold tracking-wider italic" oninput="filterBlogs()">
    </div>

    <!-- Tab 1: Internal Content (Managed by app.js) -->
    <div id="tab-internal" class="block">
      <main id="app-content">
        <div class="text-gray-500 font-bold text-center py-20 text-xl">Loading your site...</div>
      </main>
    </div>

    <!-- Tab 2: External Content (Managed by app.js) -->
    <div id="tab-external" class="hidden">
      <div id="external-articles-list" class="space-y-4">
        <!-- Populated via Javascript -->
      </div>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>

</html>
