<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#fcfcfc" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  
  <!-- Primary Meta Tags -->
  <title>Shaluka Gimhan's Blog</title>
  <meta name="title" content="Shaluka Gimhan's Blog">
  <meta name="description" content="Personal blog of Shaluka Gimhan.">
  <meta name="keywords" content="Shaluka Gimhan, Blog, Shaluka Gimhan Blog, Shaluka Blog, Gimhan Blog, Tech Blog, sh4lu-z Blog">
  <meta name="author" content="Shaluka Gimhan">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <meta name="language" content="English">
  <meta name="revisit-after" content="7 days">
  <meta name="generator" content="Vanilla JS">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://sh4lu-z.github.io/">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sh4lu-z.github.io/">
  <meta property="og:site_name" content="Shaluka Gimhan's Blog">
  <meta property="og:locale" content="en_US">
  <meta property="og:title" content="Shaluka's Blog - Thoughts & Code">
  <meta property="og:description" content="Personal blog of Shaluka Gimhan.">
  <meta property="og:image" content="https://github.com/sh4lu-z.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Shaluka Gimhan Blog Cover">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://sh4lu-z.github.io/">
  <meta name="twitter:title" content="Shaluka's Blog - Thoughts & Code">
  <meta name="twitter:description" content="Personal blog of Shaluka Gimhan.">
  <meta name="twitter:image" content="https://github.com/sh4lu-z.png">
  <meta name="twitter:site" content="@sh4lu-z">
  <meta name="twitter:creator" content="@sh4lu-z">

  <!-- Apple & Mobile Compatibility -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Shaluka's Blog">
  <meta name="application-name" content="Shaluka's Blog">
  <meta name="msapplication-TileColor" content="#0f0f0f">


  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @custom-variant dark (&:where(.dark, .dark *));
  </style>
  <link rel="stylesheet" href="style.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<script>
  if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
</script>
<body class="bg-[#fcfcfc] text-gray-900 font-sans p-4 sm:p-12 transition-colors duration-300 dark:bg-[#0f0f0f] dark:text-gray-100">
  <div class="max-w-4xl mx-auto flex flex-col min-h-screen">
    <!-- Header -->
    <header class="py-12 border-b-2 border-gray-900 dark:border-gray-100 mb-10 sm:py-16 relative">
      <button onclick="document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');" class="absolute top-0 right-0 sm:top-4 p-2 text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors" title="Toggle Theme">
        <svg class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <svg class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
      </button>
      <h1 class="text-4xl sm:text-5xl font-bold tracking-tight text-gray-900 dark:text-gray-100 cursor-pointer" onclick="goHome()">Shaluka Gimhan's Blog</h1>
      <p class="mt-4 text-lg text-gray-600 dark:text-gray-400">Thoughts, code, and everything in between.</p>
    </header>

    <!-- Navigation Tabs -->
    <nav id="main-nav" class="flex border-b border-gray-200 dark:border-gray-800 mb-6 overflow-x-auto">
      <button id="btn-tab-internal"
        class="py-3 px-6 text-sm font-bold tracking-widest uppercase border-b-2 border-gray-900 text-gray-900 dark:border-gray-100 dark:text-gray-100 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('internal')">
        Internal Blogs
      </button>
      <button id="btn-tab-external"
        class="py-3 px-6 text-sm font-bold tracking-widest uppercase border-b-2 border-transparent text-gray-400 dark:text-gray-600 hover:text-gray-900 dark:hover:text-gray-100 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('external')">
        External Publications
      </button>
    </nav>
    
    <!-- Minimalist Search Window -->
    <div id="search-container" class="mb-10 max-w-lg">
       <input type="text" id="search-input" placeholder="Search blogs..." class="w-full py-2 bg-transparent border-b border-gray-300 dark:border-gray-700 focus:border-gray-900 dark:focus:border-gray-100 focus:outline-none transition-colors text-gray-900 dark:text-gray-100 placeholder-gray-400 dark:placeholder-gray-500 text-sm font-bold tracking-wider" oninput="filterBlogs()">
    </div>

    <!-- Tab 1: Internal Content (Managed by app.js) -->
    <div id="tab-internal" class="block">
      <main id="app-content">
        <div class="flex flex-col items-center justify-center py-24">
          <div class="w-10 h-10 border-4 border-gray-200 border-t-gray-900 rounded-full animate-spin"></div>
        </div>
      </main>
    </div>

    <!-- Tab 2: External Content (Managed by app.js) -->
    <div id="tab-external" class="hidden flex-grow">
      <div id="external-articles-list" class="space-y-4">
        <!-- Populated via Javascript -->
      </div>
    </div>
    
    <!-- Footer -->
    
    <footer style="text-align: center;">
          <p>&copy; 2026 <a href="https://vercel.app" style="color: #ff5733; text-decoration: none;">Shaluka Gimhan</a>'s Blog.</p>
    </footer>
  </div>
  <script type="module" src="app.js"></script>
</body>

</html>
