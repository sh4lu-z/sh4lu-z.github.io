<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shaluka's Blog (Vanilla JS)</title>
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-[#fcfcfc] text-gray-900 font-sans p-4 sm:p-12">
  <div class="max-w-4xl mx-auto flex flex-col min-h-screen">
    <!-- Header -->
    <header class="py-12 border-b-2 border-gray-900 mb-10 sm:py-16">
      <h1 class="text-4xl sm:text-5xl font-bold tracking-tight text-gray-900 cursor-pointer" onclick="goHome()">Shaluka's Blog.</h1>
      <p class="mt-4 text-lg text-gray-600">Thoughts, code, and everything in between.</p>
    </header>

    <!-- Navigation Tabs -->
    <nav id="main-nav" class="flex border-b border-gray-200 mb-6 overflow-x-auto">
      <button id="btn-tab-internal"
        class="py-3 px-6 text-sm font-bold tracking-widest uppercase border-b-2 border-gray-900 text-gray-900 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('internal')">
        Internal Blogs
      </button>
      <button id="btn-tab-external"
        class="py-3 px-6 text-sm font-bold tracking-widest uppercase border-b-2 border-transparent text-gray-400 hover:text-gray-900 focus:outline-none whitespace-nowrap transition-colors"
        onclick="switchTab('external')">
        External Publications
      </button>
    </nav>
    
    <!-- Minimalist Search Window -->
    <div id="search-container" class="mb-10 max-w-lg">
       <input type="text" id="search-input" placeholder="Search blogs..." class="w-full py-2 bg-transparent border-b border-gray-300 focus:border-gray-900 focus:outline-none transition-colors text-gray-900 placeholder-gray-400 text-sm font-bold tracking-wider" oninput="filterBlogs()">
    </div>

    <!-- Tab 1: Internal Content (Managed by app.js) -->
    <div id="tab-internal" class="block">
      <main id="app-content">
        <div class="flex flex-col items-center justify-center py-24">
          <div class="w-10 h-10 border-4 border-gray-200 border-t-gray-900 rounded-full animate-spin"></div>
        </div>
      </main>
    </div>

    <!-- Tab 2: External Content (Managed by app.js) -->
    <div id="tab-external" class="hidden flex-grow">
      <div id="external-articles-list" class="space-y-4">
        <!-- Populated via Javascript -->
      </div>
    </div>
    
    <!-- Footer with Main Site Link -->
    <footer class="mt-auto pt-24 pb-8 text-center text-sm font-bold tracking-widest uppercase text-gray-400">
      &copy; 2026 <a href="https://sh4lu-z.vercel.app/" target="_blank" class="text-gray-900 hover:underline hover:text-black transition-colors">shaluka gimhan</a>
    </footer>
  </div>
  <script type="module" src="app.js"></script>
</body>

</html>
